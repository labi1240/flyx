    <script>
        function areAdsEnabled() {
            try {
                const stored = localStorage.getItem('ads_enabled');
                return stored ? JSON.parse(stored) : true;
            } catch (error) {
                console.error('Error reading ads setting:', error);
                return true;
            }
        }

        function getAdConfig() {
            const hostname = window.location.hostname;

            if (hostname === 'flixy.watch') {
                return {
                    kind: 'llvpn',
                    zone: '10690251',
                    script: 'https://llvpn.com/tag.min.js',
                    selector: 'script[data-zone="10690251"]'
                };
            } else if (hostname === 'flixer.su') {
                return {
                    kind: 'welibowless',
                    script: '//xg.welibowless.com/rMh9HVEAEB7Crjc/GWaJr',
                    selector: 'script[data-ad="welibowless"]'
                };
            } else {
                return {
                    kind: 'welibowless',
                    script: '//xg.welibowless.com/rMh9HVEAEB7Crjc/GWaJr',
                    selector: 'script[data-ad="welibowless"]'
                };
            }
        }
        function loadAdScript() {
            if (areAdsEnabled()) {
                const config = getAdConfig();
                const existingScript = document.querySelector(config.selector);

                if (existingScript) {
                    existingScript.remove();
                }

                if (config.kind === 'llvpn' && config.zone === '10690251') {
                    (s => {
                        s.dataset.zone = '10690251';
                        s.src = 'https://llvpn.com/tag.min.js';
                    })([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
                } else if (config.kind === 'welibowless') {
                    const script = document.createElement('script');
                    script.type = 'text/javascript';
                    script.async = true;
                    script.setAttribute('data-cfasync', 'false');
                    script.setAttribute('data-ad', 'welibowless');
                    script.src = config.script;
                    (document.body || document.documentElement).appendChild(script);
                } else {
                    (function(s, u, z, p) {
                        s.src = u, s.setAttribute('data-zone', z), p.appendChild(s);
                    })(document.createElement('script'), config.script, config.zone, document.body || document.documentElement);
                }
            } else {
                const flixyScript = document.querySelector('script[data-zone="10690251"]');
                const flixerScript = document.querySelector('script[data-zone="10690251"]');
                const welibowlessScript = document.querySelector('script[data-ad="welibowless"]');

                if (flixyScript) flixyScript.remove();
                if (flixerScript) flixerScript.remove();
                if (welibowlessScript) welibowlessScript.remove();
            }
        }

        loadAdScript();

        window.addEventListener('storage', function(e) {
            if (e.key === 'ads_enabled') {
                loadAdScript();
                if (typeof window.umami?.track === 'function') {
                    try {
                        const newValue = e.newValue ? JSON.parse(e.newValue) : true;
                        const eventName = newValue ? 'ads-on' : 'ads-off';
                        window.umami.track(eventName);
                        localStorage.setItem('ads_status_last_tracked', newValue ? 'enabled' : 'disabled');
                    } catch (error) {
                        console.error('Error tracking ads status change from storage:', error);
                    }
                }
            }
        });
        window.loadAdScript = loadAdScript;

        function trackAdsStatusEvent() {
            if (typeof window.umami?.track !== 'function') {
                setTimeout(trackAdsStatusEvent, 200);
                return;
            }

            const adsEnabled = areAdsEnabled();
            const eventSentKey = 'ads_status_event_sent';
            const lastStatusKey = 'ads_status_last_tracked';
            
            const lastTrackedStatus = localStorage.getItem(lastStatusKey);
            const currentStatus = adsEnabled ? 'enabled' : 'disabled';
            
            const hasSentInitial = localStorage.getItem(eventSentKey) === 'true';
            
            if (!hasSentInitial) {
                try {
                    const eventName = adsEnabled ? 'ads-on' : 'ads-off';
                    window.umami.track(eventName);
                    
                    localStorage.setItem(eventSentKey, 'true');
                    localStorage.setItem(lastStatusKey, currentStatus);
                } catch (error) {
                    console.error('Error tracking ads status event:', error);
                }
            } else if (lastTrackedStatus !== currentStatus) {
                try {
                    const eventName = adsEnabled ? 'ads-on' : 'ads-off';
                    window.umami.track(eventName);
                    
                    localStorage.setItem(lastStatusKey, currentStatus);
                } catch (error) {
                    console.error('Error tracking ads status event:', error);
                }
            }
        }

        trackAdsStatusEvent();

        window.trackAdsStatusEvent = trackAdsStatusEvent;
    </script>
