name = "dlhd"
main = "src/index.ts"
compatibility_date = "2024-01-17"

# KV namespace for key caching + whitelist session management
[[kv_namespaces]]
binding = "KEY_CACHE_KV"
id = "2588b7ad542644dc9b13e247deba633e"

# Environment variables (set via wrangler secret)
# API_KEYS - comma-separated list of valid API keys
# RPI_PROXY_URL - URL of the RPI proxy (legacy fallback)
# RPI_PROXY_API_KEY - API key for the RPI proxy (legacy fallback)
#
# Residential SOCKS5 Proxy — ProxyJet (set via wrangler secret):
# RESIDENTIAL_PROXY_HOST - SOCKS5 proxy hostname (proxy-jet.io)
# RESIDENTIAL_PROXY_PORT - SOCKS5 proxy port (2020)
# RESIDENTIAL_PROXY_USER - Proxy username (e.g., ACCTID-resi_region-US)
# RESIDENTIAL_PROXY_PASS - Proxy password

[vars]
RATE_LIMIT_WINDOW_MS = "60000"
RATE_LIMIT_MAX_REQUESTS = "100"
API_KEYS = "vynx"
RPI_PROXY_URL = "https://rpi-proxy.vynx.cc"
RPI_PROXY_API_KEY = "5f1845926d725bb2a8230a6ed231fce1d03f07782f74a3f683c30ec04d4ac560"
