# Cloudflare Worker configuration for Flyx Next.js app
# This file is used by @opennextjs/cloudflare for deployment

name = "flyx-main-v2"
compatibility_date = "2025-12-07"
compatibility_flags = ["nodejs_compat"]

# Main entry point (generated by opennextjs-cloudflare)
main = ".open-next/worker.js"

# Assets directory - serve static files
[assets]
directory = ".open-next/assets"

# D1 Database bindings
# DB = Main database for analytics data (live_activity, user_activity, watch_sessions, etc.)
[[d1_databases]]
binding = "DB"
database_name = "flyx-analytics-db"
database_id = "07bf7704-5198-4f57-80f3-8e4d58626d3e"

# ADMIN_DB = Admin database for admin_users, feedback, bot_detections
[[d1_databases]]
binding = "ADMIN_DB"
database_name = "flyx-admin-db"
database_id = "a7e294a7-ca7d-499f-9194-eb33b641e39a"

# =============================================================================
# ENVIRONMENT VARIABLES
# =============================================================================
# Plaintext vars are set here so Cloudflare GitHub CI picks them up.
# Secrets (TMDB_API_KEY, JWT_SECRET, RPI_PROXY_URL, RPI_PROXY_KEY) are set
# via `wrangler secret put` and stored encrypted in Cloudflare's backend.
# =============================================================================

[vars]
NODE_ENV = "production"
NEXT_PUBLIC_TMDB_API_KEY = "b89acdd87e12c283f56feb2e016b4964"
NEXT_PUBLIC_CF_SYNC_URL = "https://flyx-sync.vynx-3b3.workers.dev"
NEXT_PUBLIC_CF_PROXY_URL = "https://media-proxy.vynx-3b3.workers.dev"
NEXT_PUBLIC_CF_STREAM_PROXY_URL = "https://media-proxy.vynx-3b3.workers.dev/stream"
NEXT_PUBLIC_CF_TV_PROXY_URL = "https://media-proxy.vynx-3b3.workers.dev"
NEXT_PUBLIC_CF_TMDB_URL = "https://media-proxy.vynx-3b3.workers.dev"
NEXT_PUBLIC_DLHD_WORKER_URL = "https://dlhd.vynx-3b3.workers.dev"
NEXT_PUBLIC_USE_DLHD_PROXY = "true"
NEXT_PUBLIC_RPI_PROXY_URL = "https://rpi-proxy.vynx.cc"
NEXT_PUBLIC_RPI_PROXY_KEY = "5f1845926d725bb2a8230a6ed231fce1d03f07782f74a3f683c30ec04d4ac560"
NEXT_PUBLIC_CDN_LIVE_WORKER_URL = "https://cdn-live-extractor.vynx-3b3.workers.dev"
ENABLE_VIDSRC_PROVIDER = "true"
CDN_LIVE_WORKER_URL = "https://cdn-live-extractor.vynx-3b3.workers.dev"
DECODER_SANDBOX_URL = "https://media-proxy.vynx-3b3.workers.dev/decode"
DECODER_SANDBOX_API_KEY = "your-sandbox-api-key"

# Observability - DISABLED to reduce costs ($0.60/million events was costing ~$400/month!)
# Only enable temporarily for debugging specific issues
[observability]
enabled = true

# Cron trigger for daily metrics aggregation (midnight UTC)
[triggers]
crons = ["0 0 * * *"]

# Production environment
[env.production]
name = "flyx-main-v2"
# Variables are set in Cloudflare Dashboard - DO NOT add [env.production.vars] here!

[[env.production.d1_databases]]
binding = "DB"
database_name = "flyx-analytics-db"
database_id = "07bf7704-5198-4f57-80f3-8e4d58626d3e"

[[env.production.d1_databases]]
binding = "ADMIN_DB"
database_name = "flyx-admin-db"
database_id = "a7e294a7-ca7d-499f-9194-eb33b641e39a"

# Preview environment (for PR deployments)
[env.preview]
name = "flyx-main-v2-preview"
# Variables are set in Cloudflare Dashboard - DO NOT add [env.preview.vars] here!

[[env.preview.d1_databases]]
binding = "DB"
database_name = "flyx-analytics-db"
database_id = "07bf7704-5198-4f57-80f3-8e4d58626d3e"

[[env.preview.d1_databases]]
binding = "ADMIN_DB"
database_name = "flyx-admin-db"
database_id = "a7e294a7-ca7d-499f-9194-eb33b641e39a"
